<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hiba Travel Planner — Organisation de voyages sur mesure pour particuliers et entreprises. L'évasion redéfinie." />
    <title>Hiba Travel Planner — L'Évasion Redéfinie</title>

    <!-- Redirect SPA routes via 404.html trick (GitHub Pages) -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

    <!-- Preconnect à Calendly pour optimiser la connexion -->
    <link rel="preconnect" href="https://assets.calendly.com">
    <link rel="dns-prefetch" href="https://assets.calendly.com">

    <!-- Google Analytics GA4 -->
    <!-- ÉTAPE : Remplace G-XXXXXXXXXX par ton vrai Measurement ID depuis analytics.google.com -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6W134W84J8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6W134W84J8');
    </script>

    <!-- Calendly Widget Script (async defer pour ne pas bloquer le chargement) -->
    <script async defer src="https://assets.calendly.com/assets/external/widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
