<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Hiba Travel Planner</title>
    <script>
      // Redirect SPA routes to index.html (GitHub Pages fix)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
